<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-info">
                <div class="logo-glow">O</div>
                <div class="title-area">
                    <h1>Ollama Chat</h1>
                    <p>Local AI LLM </p>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn new-chat-btn" id="newChatBtn" type="button">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    New Chat
                </button>
                <button class="action-btn temp-chat-btn" id="tempChatBtn" type="button">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    Temporary Chat
                </button>
            </div>
        </header>

        <!-- Main split layout area -->
        <div class="main-content">
            <!-- Sidebar (Left) -->
            <aside class="sidebar">
                <h2 class="sidebar-title">Prompt History</h2>
                <div class="history-list" id="historyList">
                    <!-- History cards load here -->
                </div>
                <button class="load-more-btn" id="loadMoreBtn" type="button" style="display: none;">Load More</button>
            </aside>

            <!-- Chat Panel (Right) -->
            <div class="chat-container">
                <!-- Chat Area -->
                <div class="chat-body" id="chatBody">
                    <div class="welcome-container" id="welcomeScreen">
                        <div class="welcome-icon">🦙</div>
                        <h2 class="welcome-title">Welcome to Ollama Chat</h2>
                        <p class="welcome-desc">Enter your prompt below. The system will dispatch it to the scheduler queue, register it via <strong>add-prompt</strong>, and continuously monitor status responses.</p>
                    </div>
                </div>

                <!-- Input Box -->
                <div class="input-container">
                    <form class="input-form" id="chatForm">
                        <input 
                            type="text" 
                            class="input-field" 
                            id="userInput" 
                            placeholder="Ask llama3 something..." 
                            autocomplete="off"
                            required
                        >
                        <button type="submit" class="send-btn" id="sendBtn">
                            <svg viewBox="0 0 24 24">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
