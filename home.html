<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabOllama Chat Console</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-panel: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.08);
            --accent-purple: #7c3aed;
            --accent-blue: #2563eb;
            --accent-gradient: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --user-bubble: #7c3aed;
            --bot-bubble: #f1f5f9;
            --bot-border: rgba(0, 0, 0, 0.04);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(at 10% 20%, rgba(124, 58, 237, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(37, 99, 235, 0.05) 0px, transparent 50%);
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            margin: 20px;
            background: var(--bg-panel);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* Header Styling */
        .app-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-glow {
            width: 38px;
            height: 38px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .title-area h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .title-area p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .new-chat-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.15);
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(124, 58, 237, 0.25);
        }

        .new-chat-btn svg {
            fill: white;
            width: 14px;
            height: 14px;
        }

        .temp-chat-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .temp-chat-btn:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.04);
            transform: translateY(-1px);
        }

        .temp-chat-btn svg {
            fill: currentColor;
            width: 14px;
            height: 14px;
        }

        .temp-chat-btn.active {
            background: rgba(239, 68, 68, 0.08);
            border-color: #ef4444;
            color: #dc2626;
        }

        /* Split layout container */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100% - 71px);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            border-right: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .sidebar-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 2px;
        }
        .history-list::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .history-item {
            padding: 12px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            text-align: left;
        }

        .history-item:hover {
            border-color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.02);
            transform: translateY(-1px);
        }

        .history-item-prompt {
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-item-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .load-more-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
            text-align: center;
        }

        .load-more-btn:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.04);
        }

        /* Chat Panel Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
        }

        /* Chat Area Styling */
        .chat-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 4px;
        }
        .chat-body::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.15);
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: fadeIn 0.3s ease-out;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.bot {
            justify-content: flex-start;
        }

        .message-container {
            position: relative;
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .message-row.user .message-container {
            align-items: flex-end;
        }

        .message-row.bot .message-container {
            align-items: flex-start;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .message-row.user .message-bubble {
            background: var(--accent-gradient);
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.15);
        }

        .message-row.bot .message-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--bot-border);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .msg-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: block;
            text-align: right;
        }

        .message-row.bot .msg-meta {
            text-align: left;
            color: var(--text-secondary);
        }

        /* Edit button styling */
        .edit-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            margin-top: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .edit-btn:hover {
            color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.06);
        }

        .edit-btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px 20px;
            gap: 16px;
        }

        .welcome-icon {
            font-size: 3rem;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .welcome-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            max-width: 400px;
        }

        /* Input Area Styling */
        .input-container {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.8);
            border-top: 1px solid var(--border-color);
        }

        .input-form {
            display: flex;
            gap: 12px;
            position: relative;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px 8px 8px 16px;
            transition: all 0.3s ease;
        }

        .input-form:focus-within {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.1);
            background: rgba(255, 255, 255, 0.9);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            padding: 8px 0;
            resize: none;
            max-height: 120px;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent-gradient);
            border: none;
            outline: none;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(124, 58, 237, 0.3);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn svg {
            fill: white;
            width: 18px;
            height: 18px;
            transition: transform 0.2s ease;
        }

        .send-btn:hover svg {
            transform: translate(2px, -2px);
        }

        /* Stop Button and Loader Styling */
        .dots-loader-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stop-btn {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
        }

        .stop-btn:hover {
            background: rgba(239, 68, 68, 0.18);
            transform: scale(1.05);
        }

        .stop-btn svg {
            fill: #dc2626;
            width: 10px;
            height: 10px;
        }

        /* Dot Loading Animation */
        .dots-loader {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 4px;
        }

        .dots-loader span {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.4s infinite ease-in-out both;
        }

        .dots-loader span:nth-child(1) { animation-delay: -0.32s; }
        .dots-loader span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse-dot {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            color: #dc2626 !important;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-info">
                <div class="logo-glow">O</div>
                <div class="title-area">
                    <h1>CollabOllama Console</h1>
                    <p>Local LLM Prompt Router & Scheduler</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn new-chat-btn" id="newChatBtn" type="button">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    New Chat
                </button>
                <button class="action-btn temp-chat-btn" id="tempChatBtn" type="button">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    Temporary Chat
                </button>
            </div>
        </header>

        <!-- Main split layout area -->
        <div class="main-content">
            <!-- Sidebar (Left) -->
            <aside class="sidebar">
                <h2 class="sidebar-title">Prompt History</h2>
                <div class="history-list" id="historyList">
                    <!-- History cards load here -->
                </div>
                <button class="load-more-btn" id="loadMoreBtn" type="button" style="display: none;">Load More</button>
            </aside>

            <!-- Chat Panel (Right) -->
            <div class="chat-container">
                <!-- Chat Area -->
                <div class="chat-body" id="chatBody">
                    <div class="welcome-container" id="welcomeScreen">
                        <div class="welcome-icon">🦙</div>
                        <h2 class="welcome-title">Welcome to CollabOllama</h2>
                        <p class="welcome-desc">Enter your prompt below. The system will dispatch it to the scheduler queue, register it via <strong>add-prompt</strong>, and continuously monitor status responses.</p>
                    </div>
                </div>

                <!-- Input Box -->
                <div class="input-container">
                    <form class="input-form" id="chatForm">
                        <input 
                            type="text" 
                            class="input-field" 
                            id="userInput" 
                            placeholder="Ask llama3 something..." 
                            autocomplete="off"
                            required
                        >
                        <button type="submit" class="send-btn" id="sendBtn">
                            <svg viewBox="0 0 24 24">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatBody = document.getElementById('chatBody');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const historyList = document.getElementById('historyList');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const tempChatBtn = document.getElementById('tempChatBtn');

        let currentAbortController = null;
        let currentInterval = null;
        let isTemporaryChat = false;

        let currentHistoryPage = 1;
        const historyLimit = 10;
        let totalHistoryRecords = 0;

        function formatTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        function showWelcomeScreen(isTemp = false) {
            chatBody.innerHTML = '';
            
            const welcome = document.createElement('div');
            welcome.className = 'welcome-container';
            welcome.id = 'welcomeScreen';
            
            if (isTemp) {
                welcome.innerHTML = `
                    <div class="welcome-icon">🔒</div>
                    <h2 class="welcome-title">Temporary Chat Mode</h2>
                    <p class="welcome-desc">Prompts entered in this mode will be processed normally but <strong>will not be saved to your sidebar history list</strong> on the frontend.</p>
                `;
            } else {
                welcome.innerHTML = `
                    <div class="welcome-icon">🦙</div>
                    <h2 class="welcome-title">Welcome to CollabOllama</h2>
                    <p class="welcome-desc">Enter your prompt below. The system will dispatch it to the scheduler queue, register it via <strong>add-prompt</strong>, and continuously monitor status responses.</p>
                `;
            }
            chatBody.appendChild(welcome);
        }

        function resetChatSession(isTemp = false) {
            // Cancel active polling/requests
            if (currentAbortController) currentAbortController.abort();
            if (currentInterval) clearInterval(currentInterval);

            // Deselect selected cards in sidebar
            document.querySelectorAll('.history-item').forEach(c => c.style.borderColor = 'var(--border-color)');

            // Reset flags
            isTemporaryChat = isTemp;
            if (isTemp) {
                tempChatBtn.classList.add('active');
            } else {
                tempChatBtn.classList.remove('active');
            }

            // Show appropriate welcome screen
            showWelcomeScreen(isTemp);
        }

        newChatBtn.addEventListener('click', () => resetChatSession(false));
        tempChatBtn.addEventListener('click', () => resetChatSession(true));

        function appendMessage(text, isUser, isLoader = false) {
            const currentWelcome = document.getElementById('welcomeScreen');
            if (currentWelcome && chatBody.contains(currentWelcome)) {
                currentWelcome.remove();
            }

            const messageRow = document.createElement('div');
            messageRow.className = `message-row ${isUser ? 'user' : 'bot'}`;

            const container = document.createElement('div');
            container.className = 'message-container';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            let stopBtn = null;

            if (isLoader) {
                bubble.innerHTML = `
                    <div class="dots-loader-container">
                        <div class="dots-loader">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <button class="stop-btn" type="button" title="Stop generation">
                            <svg viewBox="0 0 24 24"><path d="M6 19h12V5H6v14z"/></svg>
                        </button>
                    </div>
                `;
                stopBtn = bubble.querySelector('.stop-btn');
            } else {
                bubble.innerText = text;
            }

            const meta = document.createElement('span');
            meta.className = 'msg-meta';
            meta.innerText = formatTime();
            bubble.appendChild(meta);

            container.appendChild(bubble);

            // Add Edit button for user messages
            if (isUser && !isLoader) {
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.type = 'button';
                editBtn.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    Edit
                `;
                editBtn.addEventListener('click', () => {
                    userInput.value = text;
                    userInput.focus();
                });
                container.appendChild(editBtn);
            }

            messageRow.appendChild(container);
            chatBody.appendChild(messageRow);
            chatBody.scrollTop = chatBody.scrollHeight;

            return { bubble, stopBtn };
        }

        // Add history item card to sidebar list
        function addHistoryItemToSidebar(item, prepend = true) {
            const card = document.createElement('div');
            card.className = 'history-item';
            card.dataset.promptId = item.promptId;
            
            let dateStr = '';
            if (item.promptdate) {
                try {
                    const d = new Date(item.promptdate);
                    dateStr = d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } catch(e) {
                    dateStr = item.promptdate;
                }
            }

            card.innerHTML = `
                <div class="history-item-prompt">${escapeHTML(item.prompts)}</div>
                <div class="history-item-meta">
                    <span>ID: ${item.promptId}</span>
                    <span>${dateStr}</span>
                </div>
            `;
            
            card.addEventListener('click', async () => {
                // Remove active classes from Temp Chat mode when viewing persistent history
                isTemporaryChat = false;
                tempChatBtn.classList.remove('active');

                // Deselect other cards
                document.querySelectorAll('.history-item').forEach(c => c.style.borderColor = 'var(--border-color)');
                card.style.borderColor = 'var(--accent-purple)';
                
                // Clear main chat area
                chatBody.innerHTML = '';
                
                // Load clicked item details
                appendMessage(item.prompts, true);
                
                const { bubble: botBubble, stopBtn } = appendMessage('', false, true);
                
                // Cancel existing request
                if (currentAbortController) currentAbortController.abort();
                if (currentInterval) clearInterval(currentInterval);
                
                currentAbortController = new AbortController();
                const { signal } = currentAbortController;
                
                if (stopBtn) {
                    stopBtn.addEventListener('click', () => {
                        if (currentAbortController) currentAbortController.abort();
                        if (currentInterval) clearInterval(currentInterval);
                        botBubble.innerHTML = `<span class="error-message">Request stopped.</span>`;
                        const meta = document.createElement('span');
                        meta.className = 'msg-meta';
                        meta.innerText = formatTime();
                        botBubble.appendChild(meta);
                    });
                }
                
                // Retrieve response status from DB
                // try {
                //     const res = await fetch(`/get-prompt-status?PromptId=${item.promptId}`, { signal });
                //     if (!res.ok) {

        // Fetch paginated history from API
        async function loadHistory(page = 1) {
            try {
                const response = await fetch(`/chat-history?page=${page}&limit=${historyLimit}`);
                if (!response.ok) return;
                const res = await response.json();
                if (res.status === 'success' && res.data) {
                    totalHistoryRecords = res.total;
                    res.data.forEach(item => {
                        if (!document.querySelector(`.history-item[data-prompt-id="${item.promptId}"]`)) {
                            addHistoryItemToSidebar(item, false);
                        }
                    });
                    
                    const loadedCount = document.querySelectorAll('.history-item').length;
                    if (loadedCount >= totalHistoryRecords) {
                        loadMoreBtn.style.display = 'none';
                    } else {
                        loadMoreBtn.style.display = 'block';
                    }
                }
            } catch (err) {
                console.error('Failed to load chat history:', err);
            }
        }

        loadMoreBtn.addEventListener('click', () => {
            currentHistoryPage++;
            loadHistory(currentHistoryPage);
        });

        // Initialize Chat History on load
        loadHistory(1);

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const promptText = userInput.value.trim();
            if (!promptText) return;

            userInput.value = '';

            // Cancel any active request
            if (currentAbortController) {
                currentAbortController.abort();
            }
            if (currentInterval) {
                clearInterval(currentInterval);
            }

            appendMessage(promptText, true);

            // Create a new AbortController
            currentAbortController = new AbortController();
            const { signal } = currentAbortController;

            // Create loading response bubble for bot
            const { bubble: botBubble, stopBtn } = appendMessage('', false, true);

            // Attach Stop click handler
            if (stopBtn) {
                stopBtn.addEventListener('click', () => {
                    if (currentAbortController) {
                        currentAbortController.abort();
                    }
                    if (currentInterval) {
                        clearInterval(currentInterval);
                    }
                    botBubble.innerHTML = `<span class="error-message">Request stopped.</span>`;
                    const meta = document.createElement('span');
                    meta.className = 'msg-meta';
                    meta.innerText = formatTime();
                    botBubble.appendChild(meta);
                });
            }

            try {
                // 1. Call add-prompt endpoint
                const response = await fetch('/add-prompt', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompts: promptText }),
                    signal: signal
                });

                if (!response.ok) {
                    throw new Error('Failed to register prompt');
                }

                const result = await response.json();
                const promptId = result.promptId;

                // Prepend new prompt item to sidebar history list if NOT in temporary mode
                if (!isTemporaryChat) {
                    const newItem = {
                        promptId: promptId,
                        prompts: promptText,
                        processState: 1,
                        promptdate: new Date().toISOString(),
                        prompsResponce: null
                    };
                    addHistoryItemToSidebar(newItem, true);
                }

                // 2. Poll prompt status until response is ready
                pollPromptStatus(promptId, botBubble, signal);

            } catch (err) {
                if (err.name === 'AbortError') return;

                botBubble.innerHTML = `<span class="error-message">Error: ${err.message}</span>`;
                const meta = document.createElement('span');
                meta.className = 'msg-meta';
                meta.innerText = formatTime();
                botBubble.appendChild(meta);
            }
        });

        async function pollPromptStatus(promptId, botBubble, signal) {
            const maxAttempts = 90; // 2+ minutes max
            let attempts = 0;

            currentInterval = setInterval(async () => {
                attempts++;
                if (attempts > maxAttempts) {
                    clearInterval(currentInterval);
                    botBubble.innerHTML = `<span class="error-message">Error: Request timed out.</span>`;
                    const meta = document.createElement('span');
                    meta.className = 'msg-meta';
                    meta.innerText = formatTime();
                    botBubble.appendChild(meta);
                    return;
                }

                try {
                    const response = await fetch(`/get-prompt-status?PromptId=${promptId}`, { signal });
                    if (!response.ok) {
                        if (response.status === 404) {
                            clearInterval(currentInterval);
                            throw new Error('Prompt status record not found.');
                        }
                        return;
                    }

                    const data = await response.json();
                    if (data.status === 'success' && data.data) {
                        const state = data.data.processState;
                        const reply = data.data.prompsResponce;

                        // processState 2 indicates completed
                        if (state === 2 || (reply && reply.trim() !== '')) {
                            clearInterval(currentInterval);
                            botBubble.innerHTML = '';
                            botBubble.innerText = reply;
                            
                            const meta = document.createElement('span');
                            meta.className = 'msg-meta';
                            meta.innerText = formatTime();
                            botBubble.appendChild(meta);
                        }
                    }
                } catch (err) {
                    if (err.name === 'AbortError') return;
                    clearInterval(currentInterval);
                    botBubble.innerHTML = `<span class="error-message">Error: ${err.message}</span>`;
                    const meta = document.createElement('span');
                    meta.className = 'msg-meta';
                    meta.innerText = formatTime();
                    botBubble.appendChild(meta);
                }
            }, 1500);
        }
    </script>
